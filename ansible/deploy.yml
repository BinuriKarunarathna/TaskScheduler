- name: Deploy Application Containers
  hosts: aws_ec2
  become: yes
  vars:
    # Variables passed from Jenkins
    backend_image: ""
    frontend_image: ""
    db_host: ""
    db_user: ""
    db_password: ""
    db_name: "devops"

  tasks:
    - name: Ensure Docker and AWS CLI are installed
      yum:
        name: 
          - docker
          - aws-cli
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Login to ECR
      shell: "aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin {{ backend_image.split('/')[0] }}"

    - name: Pull Backend Image
      shell: "docker pull {{ backend_image }}"

    - name: Pull Frontend Image
      shell: "docker pull {{ frontend_image }}"

    - name: Stop and remove existing containers if any
      shell: "docker stop backend frontend || true && docker rm backend frontend || true"

    - name: Create Docker network
      shell: "docker network create devops-net || true"

    - name: Run Backend Container
      shell: |
        docker run -d --name backend --network devops-net --restart always \
        -p 5000:5000 \
        -e DB_HOST={{ db_host }} \
        -e DB_USER={{ db_user }} \
        -e DB_PASSWORD={{ db_password }} \
        -e DB_NAME={{ db_name }} \
        {{ backend_image }}

    - name: Run Frontend Container
      shell: |
        docker run -d --name frontend --network devops-net --restart always \
        -p 80:80 \
        {{ frontend_image }}
