  #     MYSQL_ROOT_PASSWORD: 1234
  #     MYSQL_DATABASE: devops
  #     MYSQL_USER: devapp
  #     MYSQL_PASSWORD: devpass
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p1234"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 20s


  db:
    image: mysql:8.0
    container_name: devops-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=devops
      - MYSQL_ROOT_HOST=%
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s



  backend:
    image: binuri1234/taskmanager-backend:latest
    container_name: devops-backend
    ports:
      - "5000:5000"
    environment:
      # Use the EC2 Public IP or RDS Endpoint here
      - DB_HOST=devops-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=1234
      - DB_NAME=devops
    restart: always

  frontend:
    image: binuri1234/taskmanager-frontend:latest
    container_name: devops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data:


